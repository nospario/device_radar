{% extends "base.html" %}
{% block title %}Assistant - Device Radar{% endblock %}

{% block content %}
<div class="assistant-page">
    <div class="assistant-toolbar">
        <div class="toolbar-left">
            <label class="alexa-switch" title="Automatically read responses on Alexa">
                <input type="checkbox" id="alexa-toggle">
                <span class="switch-slider"></span>
            </label>
            <span class="toolbar-label" id="alexa-toggle-label">Read on Alexa</span>
            <select id="alexa-device" title="Echo device">
                <option value="">Default Echo</option>
                {% for d in echo_devices %}
                <option value="{{ d.device_name }}">{{ d.alias or d.device_name }}</option>
                {% endfor %}
            </select>
            <select id="alexa-voice" title="Voice">
                <option value="">Default voice</option>
                <option value="Brian">Brian</option>
                <option value="Amy">Amy</option>
                <option value="Emma">Emma</option>
                <option value="Matthew">Matthew</option>
                <option value="Joanna">Joanna</option>
                <option value="Kendra">Kendra</option>
            </select>
        </div>
        <button class="toolbar-btn" onclick="clearHistory()" title="Clear conversation">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            Clear
        </button>
    </div>

    <div id="status-msg" class="pair-status" style="display:none;"></div>

    <div id="chat-messages" class="chat-messages">
        <div class="chat-empty" id="chat-empty">
            <div class="empty-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            </div>
            <p>Ask the assistant anything</p>
            <span>Powered by Ollama running locally</span>
        </div>
    </div>

    <div class="chat-input-wrap">
        <form id="chat-form" class="chat-input-bar">
            <input type="text" id="chat-input" placeholder="Message the assistant..." autocomplete="off">
            <button type="submit" class="send-btn" id="chat-send" title="Send message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
    /* Override container padding for full-height layout */
    .container:has(.assistant-page) {
        padding: 0;
        max-width: 100%;
    }
    .assistant-page {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 53px);
        max-width: 900px;
        margin: 0 auto;
        padding: 0;
    }

    /* Toolbar */
    .assistant-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.6rem 1rem;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .toolbar-left {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
    }
    .toolbar-label {
        font-size: 0.8rem;
        color: var(--text-dim);
        white-space: nowrap;
    }
    .toolbar-btn {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.35rem 0.7rem;
        font-size: 0.78rem;
        color: var(--text-dim);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s;
    }
    .toolbar-btn:hover { color: var(--red); border-color: var(--red); }
    .assistant-toolbar select {
        padding: 0.3rem 0.5rem;
        font-size: 0.78rem;
        background: var(--bg);
        color: var(--text-dim);
        border: 1px solid var(--border);
        border-radius: 6px;
    }

    /* Toggle switch */
    .alexa-switch {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
    }
    .alexa-switch input { opacity: 0; width: 0; height: 0; }
    .switch-slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: var(--border);
        border-radius: 20px;
        transition: 0.2s;
    }
    .switch-slider::before {
        content: "";
        position: absolute;
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background: var(--text-dim);
        border-radius: 50%;
        transition: 0.2s;
    }
    .alexa-switch input:checked + .switch-slider { background: var(--green); }
    .alexa-switch input:checked + .switch-slider::before {
        transform: translateX(16px);
        background: #fff;
    }

    /* Chat area */
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem 0;
        scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Empty state */
    .chat-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-dim);
        gap: 0.5rem;
    }
    .empty-icon { opacity: 0.3; }
    .chat-empty p { font-size: 1.1rem; color: var(--text); margin: 0; }
    .chat-empty span { font-size: 0.8rem; }

    /* Message rows — full width like ChatGPT/Claude */
    .chat-row {
        padding: 1.25rem 1.5rem;
        display: flex;
        gap: 1rem;
        align-items: flex-start;
    }
    .chat-row.assistant {
        background: var(--bg-card);
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
    }
    .chat-row.user {
        background: transparent;
    }

    /* Avatar */
    .chat-avatar {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 0.8rem;
    }
    .chat-row.user .chat-avatar {
        background: rgba(91, 138, 245, 0.2);
        color: var(--accent);
    }
    .chat-row.assistant .chat-avatar {
        background: rgba(52, 199, 89, 0.2);
        color: var(--green);
    }

    /* Message content */
    .chat-content {
        flex: 1;
        min-width: 0;
    }
    .chat-role {
        font-size: 0.75rem;
        font-weight: 600;
        margin-bottom: 0.3rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }
    .chat-row.user .chat-role { color: var(--accent); }
    .chat-row.assistant .chat-role { color: var(--green); }
    .chat-text {
        font-size: 0.92rem;
        line-height: 1.65;
        color: var(--text);
        white-space: pre-wrap;
        word-wrap: break-word;
    }
    .chat-time {
        font-size: 0.68rem;
        color: var(--text-dim);
        margin-top: 0.4rem;
        opacity: 0;
        transition: opacity 0.15s;
    }
    .chat-row:hover .chat-time { opacity: 1; }

    /* Search badge */
    .search-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.72rem;
        color: var(--accent);
        background: rgba(91, 138, 245, 0.1);
        border: 1px solid rgba(91, 138, 245, 0.2);
        border-radius: 4px;
        padding: 0.15rem 0.5rem;
        margin-bottom: 0.4rem;
    }

    /* Input area */
    .chat-input-wrap {
        flex-shrink: 0;
        padding: 1rem 1.5rem 1.25rem;
        background: var(--bg);
        border-top: 1px solid var(--border);
    }
    .chat-input-bar {
        display: flex;
        align-items: center;
        gap: 0;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.25rem 0.25rem 0.25rem 1rem;
        transition: border-color 0.15s;
    }
    .chat-input-bar:focus-within {
        border-color: var(--accent);
    }
    .chat-input-bar input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 0.92rem;
        padding: 0.5rem 0;
    }
    .chat-input-bar input::placeholder {
        color: var(--text-dim);
    }
    .send-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        flex-shrink: 0;
        transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    /* Loading dots */
    .dot-pulse {
        display: inline-flex;
        gap: 0.35rem;
        padding: 0.2rem 0;
    }
    .dot-pulse span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-dim);
        animation: dotPulse 1.2s ease-in-out infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 768px) {
        .assistant-page { height: calc(100vh - 55px); }
        .assistant-toolbar { flex-wrap: wrap; gap: 0.5rem; }
        .chat-row { padding: 1rem; gap: 0.75rem; }
        .chat-input-wrap { padding: 0.75rem; }
    }
</style>
<script>
(function() {
    const STORAGE_KEY = 'assistant-alexa-settings';

    function restoreSettings() {
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            if (saved.toggle) document.getElementById('alexa-toggle').checked = true;
            if (saved.device) document.getElementById('alexa-device').value = saved.device;
            if (saved.voice) document.getElementById('alexa-voice').value = saved.voice;
        } catch (_) {}
        updateToggleLabel();
    }

    function saveSettings() {
        const settings = {
            toggle: document.getElementById('alexa-toggle').checked,
            device: document.getElementById('alexa-device').value,
            voice: document.getElementById('alexa-voice').value,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
        updateToggleLabel();
    }

    function updateToggleLabel() {
        const label = document.getElementById('alexa-toggle-label');
        const on = document.getElementById('alexa-toggle').checked;
        label.style.color = on ? 'var(--green)' : 'var(--text-dim)';
    }

    document.getElementById('alexa-toggle').addEventListener('change', saveSettings);
    document.getElementById('alexa-device').addEventListener('change', saveSettings);
    document.getElementById('alexa-voice').addEventListener('change', saveSettings);

    function scrollToBottom() {
        const c = document.getElementById('chat-messages');
        c.scrollTop = c.scrollHeight;
    }

    function hideEmpty() {
        const el = document.getElementById('chat-empty');
        if (el) el.remove();
    }

    function appendMessage(role, content, timestamp, scroll, options) {
        if (scroll === undefined) scroll = true;
        hideEmpty();
        const container = document.getElementById('chat-messages');

        const row = document.createElement('div');
        row.className = 'chat-row ' + role;

        // Avatar
        const avatar = document.createElement('div');
        avatar.className = 'chat-avatar';
        if (role === 'user') {
            avatar.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
        } else {
            avatar.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>';
        }
        row.appendChild(avatar);

        // Content
        const content_div = document.createElement('div');
        content_div.className = 'chat-content';

        const roleLabel = document.createElement('div');
        roleLabel.className = 'chat-role';
        roleLabel.textContent = role === 'user' ? 'You' : 'Assistant';
        content_div.appendChild(roleLabel);

        // Search badge
        if (options && options.searched) {
            const badge = document.createElement('div');
            badge.className = 'search-badge';
            badge.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg> Searched the web';
            content_div.appendChild(badge);
        }

        const text = document.createElement('div');
        text.className = 'chat-text';
        text.textContent = content;
        content_div.appendChild(text);

        if (timestamp) {
            const time = document.createElement('div');
            time.className = 'chat-time';
            time.textContent = new Date(timestamp * 1000).toLocaleTimeString();
            content_div.appendChild(time);
        }

        row.appendChild(content_div);
        container.appendChild(row);
        if (scroll) scrollToBottom();
    }

    function showLoading() {
        hideEmpty();
        const container = document.getElementById('chat-messages');
        const row = document.createElement('div');
        row.className = 'chat-row assistant';
        row.id = 'loading-indicator';

        const avatar = document.createElement('div');
        avatar.className = 'chat-avatar';
        avatar.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>';
        row.appendChild(avatar);

        const content = document.createElement('div');
        content.className = 'chat-content';
        content.innerHTML = '<div class="chat-role">Assistant</div><div class="dot-pulse"><span></span><span></span><span></span></div>';
        row.appendChild(content);

        container.appendChild(row);
        scrollToBottom();
    }

    function hideLoading() {
        const el = document.getElementById('loading-indicator');
        if (el) el.remove();
    }

    function showStatus(msg, success) {
        const el = document.getElementById('status-msg');
        el.textContent = msg;
        el.className = 'pair-status ' + (success ? 'pair-success' : 'pair-error');
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 3000);
    }

    async function speakOnAlexa(text) {
        const device = document.getElementById('alexa-device').value;
        const voice = document.getElementById('alexa-voice').value;
        try {
            const resp = await api('/api/assistant/speak', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: text,
                    device: device || null,
                    voice: voice || null,
                }),
            });
            if (!resp.ok) {
                showStatus(resp.error || 'Failed to speak on Alexa', false);
            }
        } catch (err) {
            showStatus('Failed to speak on Alexa', false);
        }
    }

    async function loadChatHistory() {
        try {
            const data = await api('/api/assistant/history');
            if (data.messages && data.messages.length > 0) {
                const container = document.getElementById('chat-messages');
                container.innerHTML = '';
                for (const msg of data.messages) {
                    appendMessage(msg.role, msg.content, msg.timestamp, false);
                }
                scrollToBottom();
            }
        } catch (err) {
            console.error('Failed to load chat history:', err);
        }
    }

    // Chat form submit
    document.getElementById('chat-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        appendMessage('user', text, Date.now() / 1000);
        showLoading();

        const sendBtn = document.getElementById('chat-send');
        sendBtn.disabled = true;

        try {
            const data = await api('/api/assistant/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text }),
            });
            hideLoading();
            appendMessage('assistant', data.response, data.timestamp, true, { searched: data.searched });

            if (document.getElementById('alexa-toggle').checked) {
                speakOnAlexa(data.response);
            }
        } catch (err) {
            hideLoading();
            appendMessage('assistant',
                'Sorry, something went wrong. Please try again.',
                Date.now() / 1000);
        } finally {
            sendBtn.disabled = false;
            input.focus();
        }
    });

    // Clear history
    window.clearHistory = async function() {
        if (!confirm('Clear all conversation history?')) return;
        try {
            await api('/api/assistant/history', { method: 'DELETE' });
            document.getElementById('chat-messages').innerHTML =
                '<div class="chat-empty" id="chat-empty">' +
                '<div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>' +
                '<p>Ask the assistant anything</p>' +
                '<span>Powered by Ollama running locally</span></div>';
            showStatus('History cleared', true);
        } catch (err) {
            showStatus('Failed to clear history', false);
        }
    };

    // Init
    restoreSettings();
    loadChatHistory();
    document.getElementById('chat-input').focus();
})();
</script>
{% endblock %}
